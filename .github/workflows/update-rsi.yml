name: Update RSI JSON

on:
  push:
    branches:
      - main        # main 브랜치에 push될 때도 실행
  schedule:
    - cron: '0 21 * * *'  # 매일 06:00 KST (21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write  # git push를 위해 반드시 필요

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # push 권한 유지

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: python scripts/update_stocks.py

      - name: Run update detail script
        run: python scripts/generate_pages.py

      - name: Print JSON content
        run: cat data/rsi_data.json

      # 6️⃣ Git commit & push
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f stocks data
          # 항상 commit
          git commit -m "🔄 Update RSI $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push




          
