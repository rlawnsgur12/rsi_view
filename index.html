<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSI Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>미국 주식 리포트</h2>

  <div id="market-widget" class="market-widget">
    <span class="market-widget-loading">시장 지표 로딩 중...</span>
  </div>

  <div class="tabs">
    <button class="active" data-tab="top100">Top 1~100</button>
    <button data-tab="top101_200">Top 101~200</button>
    <button data-tab="custom">Custom</button>
  </div>

  <div class="controls">
    <input id="search-box" type="text" placeholder="🔍 티커 또는 종목명 검색">
    <div class="filter-chips">
      <button class="chip" data-filter="all">전체</button>
      <button class="chip" data-filter="oversold">일 RSI ≤ 30</button>
      <button class="chip" data-filter="warning">일 RSI ≤ 35</button>
      <button class="chip" data-filter="weekly_oversold">주 RSI ≤ 35</button>
      <button class="chip chip-highlight" data-filter="dual">🎯 일·주 동시 ≤ 35</button>
      <button class="chip" data-filter="recent7">최근 7일 과매도</button>
    </div>
    <select id="sector-filter">
      <option value="">모든 섹터</option>
    </select>
    <span id="result-count" class="result-count"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Name</th>
        <th>Sector</th>
        <th>Chart</th>
        <th>일 RSI</th>
        <th>일 RSI 30일 추세</th>
        <th>주 RSI</th>
        <th>주 RSI 30주 추세</th>
        <th class="rsi-col">🎯 쌍과매도</th>
        <th class="rsi-col">일 RSI ≤ 30</th>
        <th class="rsi-col">30 &lt; 일 RSI ≤ 35</th>
        <th class="rsi-col">최근 7일 내 일 RSI ≤ 30</th>
        <th>현재가</th>
        <th>일변동(%)</th>
        <th>52주 위치(%)</th>
        <th>거래량 비율</th>
        <th>📈 EPS 성장(%)</th>
        <th>📈 매출 YoY(%)</th>
        <th title="과거 5년 RSI≤30 진입 후 1개월 평균 수익률 / 승률 (진입 N건)">🧪 1M 평균/승률</th>
        <th title="과거 5년 RSI≤30 진입 후 3개월 평균 수익률 / 승률 (진입 N건)">🧪 3M 평균/승률</th>
        <th>PER</th>
        <th>PER(예상)</th>
        <th>PBR</th>
        <th>ROE</th>
        <th>EPS</th>
        <th>EPS(예상)</th>
        <th title="백테스트3M승률(40)+Forward PER저평가(25)+EPS성장(20)+매출YoY(15) — 저평가+우상향 가능성 평가">📊 종합의견</th>
      </tr>
    </thead>
    <tbody id="rsi-table-body">
    </tbody>
  </table>

  <script type="module" src="js/app.js"></script>
</body>
</html>
